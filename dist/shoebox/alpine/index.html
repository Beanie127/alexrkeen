<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/kelpui@1/css/kelp.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/kelpui@1/js/kelp.js"></script>

</head>

<body>
    <div class="container-2xl">
        <h1>Alpine Playground</h1>
        <h2>Counter</h2>
        <div x-data="{count: 0}"><button @click="count++">Increment</button>&nbsp;<span x-text="count"></span></div>
        <hr />
        <h2>Details/Summary</h2>
        <div x-data="{open: false}">
            <button @click="open = ! open">Toggle</button>
            <div x-show="open" @click.outside="open = false">Contents...</div>
        </div>
        <hr />
        <h2>Search Filter</h2>
        <div x-data="{
            search: '',
            items: ['foo','bar','baz'],
            get filteredItems() {
                return this.items.filter(
                    i => i.startsWith(this.search)
                )
            }
        }">
            <input x-model="search" placeholder="Search...">
            <ul>
                <template x-for="item in filteredItems" :key="item">
                    <li x-text="item"></li>
                </template>
            </ul>
        </div>
    </div>
</body>

</html>
