</style></head><body><header><a id="home-link" href="/" title="home"><span class="visually-hidden">Home</span><img width="100" src="/images/favicon.svg" alt="A monogram of the letters A K in a circle"></a><h1>Captain&#39;s Log</h1></header><div id="game" class="col-wide" data-astro-cid-24tuw2hr><output data-astro-cid-24tuw2hr><p data-astro-cid-24tuw2hr>You are the captain of a starship. Your vessel is small, your crew is smaller, and your mission through space is perilous and vital.<br data-astro-cid-24tuw2hr> Type GO to take the helm.</p></output><div data-astro-cid-24tuw2hr>Input command:<input type="text" name="terminal" id="terminal" autocomplete="off" data-astro-cid-24tuw2hr></div><div id="status" data-astro-cid-24tuw2hr>Haul: <span id="haul" data-astro-cid-24tuw2hr>4</span> | Encounters remaining: <span id="encounters-remaining" data-astro-cid-24tuw2hr>8</span></div></div></body></html><script>
	const input = document.querySelector('input');
	const output = document.querySelector('output');
	const haul = document.querySelector('#haul');
	const encountersRemaining = document.querySelector('#encounters-remaining');

	const negativeDemeanours = [
		'cold',
		'hostile',
		'unfriendly',
		'threatening',
		'violent',
		'aggressive',
		'rude',
	];
	const neutralDemeanours = [
		'mysterious',
		'enigmatic',
		'inscrutible',
		'confusing',
		'strange',
	];
	const positiveDemeanours = [
		'friendly',
		'welcoming',
		'noble',
		'warm',
		'pleasant',
		'cordial',
		'nice',
	];

	const dX = (min, max) => {
		const range = max - min + 1;
		return min + Math.floor(Math.random() * range);
	};

	class Alien {
		constructor() {
			this.demeanour;
			this.nature;
		}

		checkDemeanour() {
			const die = dX(1, 4);
			switch (die) {
				case 1:
					this.demeanour = 'positive';
					break;
				case 2:
				case 3:
					this.demeanour = 'neutral';
					break;
				case 4:
					this.demeanour = 'negative';
					break;
			}
			console.log('Demeanour is', die, '/', this.demeanour);
		}
		checkNature() {
			const die = dX(1, 4);
			switch (die) {
				case 1:
					this.nature = 'negative';
					break;
				case 2:
				case 3:
					switch (this.demeanour) {
						case 'negative':
							this.nature = 'negative';
							break;
						case 'positive':
							this.nature = 'positive';
							break;
						case 'neutral':
							this.nature = 'flighty';
							break;
					}
					break;
				case 4:
					this.nature = 'positive';
					break;
			}
			console.log('Nature is', die, '/', this.nature);
		}
	}
	class Game {
		constructor() {
			this.haul = 4;
			this.encountersRemaining = 8;
			this.currentAlien = new Alien();
			this.outcome;
			this.choices = { attack: 0, flee: 0, trust: 0 };
		}

		updateCounters() {
			haul.textContent = this.haul;
			encountersRemaining.textContent = this.encountersRemaining;
		}

		narrate(msg) {
			const p = document.createElement('p');
			p.innerHTML = msg;
			output.appendChild(p);
			output
				.querySelectorAll('p')
				[output.children.length - 1].scrollIntoView(true);
		}
		handleCommand(command) {
			switch (command) {
				case 'go':
				case 'start':
				case 'proceed':
				case 'advance':
				case 'continue':
					this.advance();
					break;
				case 'trust':
					this.trust();
					break;
				case 'fight':
				case 'attack':
					this.attack();
					break;
				case 'run':
				case 'flee':
					this.flee();
					break;
				case 'start':
				case 'restart':
					start();
					break;
				default:
					this.narrate('Command not recognised!');
					break;
			}
		}
		getDescriptor(sentiment) {
			let descriptor;
			if (sentiment == 'positive') {
				descriptor =
					positiveDemeanours[dX(0, positiveDemeanours.length - 1)];
			} else if (sentiment == 'negative') {
				descriptor =
					negativeDemeanours[dX(0, negativeDemeanours.length - 1)];
			} else {
				descriptor =
					neutralDemeanours[dX(0, neutralDemeanours.length - 1)];
			}
			return descriptor;
		}
		advance() {
			this.currentAlien = new Alien();
			this.currentAlien.checkDemeanour();
			this.currentAlien.checkNature();
			this.narrate(
				`You encounter an alien vessel. Its crew seem ${this.getDescriptor(this.currentAlien.demeanour)}. Would you like to TRUST, FLEE or ATTACK?`,
			);
		}

		flee() {
			this.choices.flee++;
			this.haul--;
			this.narrate(`You flee, using 1 haul in the process.`);
			this.endTurn();
		}

		trust() {
			this.choices.trust++;
			this.outcome = dX(1, 2);
			switch (this.currentAlien.nature) {
				case 'positive':
					this.haul += this.outcome;
					this.narrate(
						`The aliens offer to exchange resources. You gain ${this.outcome} haul.`,
					);
					break;
				case 'flighty':
					this.narrate(
						`The aliens depart without further communications.`,
					);
					break;
				case 'negative':
					this.haul -= this.outcome;
					this.narrate(
						`The aliens attack you, taking ${this.outcome} haul.`,
					);
					break;
			}
			this.endTurn();
		}

		attack() {
			this.choices.attack++;
			switch (this.currentAlien.nature) {
				case 'positive':
					this.outcome = dX(0, 3);
					this.haul += this.outcome;
					this.narrate(
						`You betray the aliens' trust. You lose a sliver of your humanity. You gain ${this.outcome > 0 ? this.outcome + ' haul' : 'nothing'}.`,
					);
					break;
				case 'flighty':
					this.narrate(
						`The aliens anticipate your attack and escape. You lose a sliver of your humanity.`,
					);
					break;
				case 'negative':
					this.outcome = dX(-1, 2);

					this.haul += this.outcome;
					this.narrate(
						`You engage in a vicious battle with the aliens, ${this.outcome >= 0 ? 'gaining' : 'losing'} ${this.outcome == 0 ? 'nothing' : Math.sqrt(this.outcome * this.outcome) + ' haul'} in the process.`,
					);
					break;
			}
			this.endTurn();
		}
		endTurn() {
			this.updateCounters();
			if (this.haul < 0) {
				this.die();
				return;
			}
			this.encountersRemaining--;
			if (this.encountersRemaining == 0) {
				this.survive();
				return;
			}
		}
		die() {
			setTimeout(() => {
				this.narrate(
					'You have run out of haul. All is lost. Make your final speech to the crew.',
				);
			}, 750);
			this.updateCounters();
		}
		survive() {
			setTimeout(() => {
				this.narrate(
					`Your mission is over. You survived with ${this.haul} haul remaining.<br>You chose to trust ${this.choices.trust} times, to flee ${this.choices.flee} times, and to fight ${this.choices.attack} times. Did you choose wisely? What did you sacrifice?<br>To go again, type RESTART.`,
				);
			}, 750);
			this.updateCounters();
		}
	}

	let game = new Game();

	function start() {
		output.innerHTML = '';
		game = new Game();
		game.advance();
	}

	input.addEventListener('keyup', (e) => {
		if (e.key !== 'Enter') return;
		game.handleCommand(input.value.toLowerCase());
		input.value = '';
	});
</script>
